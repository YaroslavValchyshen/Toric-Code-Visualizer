name: Build and Deploy WebAssembly App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Emscripten Toolchain
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 'latest'

    - name: Configure Project with CMake
      run: |
        emcmake cmake -B build \
          -DCMAKE_EXE_LINKER_FLAGS="-s FULL_ES3=1 --preload-file Shaders --shell-file ../shell_minimal.html" \
          -DCMAKE_EXECUTABLE_SUFFIX=".html"

    - name: Build Project
      run: cmake --build build

    - name: Prepare Artifacts for Deployment
      run: |
        mkdir -p dist
        # Wildcards capture the output regardless of capitalization or exact name
        cp build/*.html dist/index.html
        cp build/*.js dist/
        cp build/*.wasm dist/
        # The true statement prevents failure if no preloaded asset files are bundled yet
        cp build/*.data dist/ 2>/dev/null || true

    - name: Push Build to GitHub Pages Branch
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: dist
        branch: gh-pages
